name: Deploy to Cloudflare Pages (Deno Fresh)

on:
  push:
    branches: [ main ]

# These permissions are required for GitHub Pages in the new Actions-based model.
permissions:
  contents:    read
  deployments: write

env:
  CLOUDFLARE_PAGES_PROJECT: ${{ vars.CLOUDFLARE_PAGES_PROJECT }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # 1 Check out code
      - uses: actions/checkout@v4

      # 2 Install Deno runtime (latest v1 stable)
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      # 3 Build the Fresh site → ./build
      - name: Build (Fresh export)
        run: deno task build

      # 4 Push that folder to Cloudflare Pages
      - name: Publish to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken:  ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy ./build --project-name=${{ env.CLOUDFLARE_PAGES_PROJECT }} --branch=${{ github.ref_name }} --commit-dirty=true
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
