name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Setup job to install dependencies once
  setup:
    runs-on: ubuntu-latest
    name: Setup Dependencies

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v1
        with:
          deno-version: v2.x

      - name: Cache Deno and Node modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.deno
            ~/.cache/deno
            node_modules
          key: ${{ runner.os }}-deno-node_modules-${{ hashFiles('deno.json', 'deno.lock') }}
          restore-keys: |
            ${{ runner.os }}-deno-node_modules-

      - name: Install dependencies
        run: deno task install # Assuming you have an "install" task in deno.json

      - name: Cache SvelteKit build artifacts
        uses: actions/cache@v4
        with:
          path: .svelte-kit
          key: ${{ runner.os }}-sveltekit-${{ github.sha }}

  # Parallel jobs that use cached dependencies
  quality:
    runs-on: ubuntu-latest
    name: Code Quality
    needs: setup

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v1
        with:
          deno-version: v2.x

      - name: Restore Deno and Node modules cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.deno
            ~/.cache/deno
            node_modules
          key: ${{ runner.os }}-deno-node_modules-${{ hashFiles('deno.json', 'deno.lock') }}
          restore-keys: |
            ${{ runner.os }}-deno-node_modules-

      - name: Restore SvelteKit cache
        uses: actions/cache@v4
        with:
          path: .svelte-kit
          key: ${{ runner.os }}-sveltekit-${{ github.sha }}

      - name: Format check
        run: deno task format --check

      - name: Lint
        run: deno task lint

  typecheck:
    runs-on: ubuntu-latest
    name: Type Check
    needs: setup

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v1
        with:
          deno-version: v2.x

      - name: Restore Deno and Node modules cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.deno
            ~/.cache/deno
            node_modules
          key: ${{ runner.os }}-deno-node_modules-${{ hashFiles('deno.json', 'deno.lock') }}
          restore-keys: |
            ${{ runner.os }}-deno-node_modules-

      - name: Restore SvelteKit cache
        uses: actions/cache@v4
        with:
          path: .svelte-kit
          key: ${{ runner.os }}-sveltekit-${{ github.sha }}

      - name: Type check
        run: deno task check

  test:
    runs-on: ubuntu-latest
    name: Tests
    needs: setup

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v1
        with:
          deno-version: v2.x

      - name: Restore Deno and Node modules cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.deno
            ~/.cache/deno
            node_modules
          key: ${{ runner.os }}-deno-node_modules-${{ hashFiles('deno.json', 'deno.lock') }}
          restore-keys: |
            ${{ runner.os }}-deno-node_modules-
      
      - name: Restore SvelteKit cache
        uses: actions/cache@v4
        with:
          path: .svelte-kit
          key: ${{ runner.os }}-sveltekit-${{ github.sha }}

      - name: Run tests
        run: deno task test

  build:
    runs-on: ubuntu-latest
    name: Build
    needs: [quality, typecheck, test]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v1
        with:
          deno-version: v2.x
      
      - name: Restore Deno and Node modules cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.deno
            ~/.cache/deno
            node_modules
          key: ${{ runner.os }}-deno-node_modules-${{ hashFiles('deno.json', 'deno.lock') }}
          restore-keys: |
            ${{ runner.os }}-deno-node_modules-

      - name: Restore SvelteKit cache
        uses: actions/cache@v4
        with:
          path: .svelte-kit
          key: ${{ runner.os }}-sveltekit-${{ github.sha }}

      - name: Build
        run: deno task build

      - name: Upload build artifacts
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: build-files
          path: build/
          retention-days: 1
