name: Performance & Bundle Analysis

on:
  pull_request:
    branches: [main]
  workflow_dispatch: # Allow manual trigger

jobs:
  bundle-analysis:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v1
        with:
          deno-version: v2.x # Or your specific Deno version

      - name: Cache Deno and Node modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.deno
            ~/.cache/deno
            node_modules
          key: ${{ runner.os }}-deno-node_modules-${{ hashFiles('deno.json', 'deno.lock') }}
          restore-keys: |
            ${{ runner.os }}-deno-node_modules-

      - name: Install dependencies
        run: deno task install # Or your specific install command

      - name: Build and analyze bundle
        run: |
          deno task build # Or your specific build command
          echo "Build completed successfully"

      - name: Check bundle size
        run: |
          echo "Checking bundle sizes..."
          find build -name "*.js" -exec ls -lh {} \; | head -10
          find build -name "*.css" -exec ls -lh {} \; | head -5

      - name: Build summary
        run: |
          echo "📊 Build Summary"
          echo "================"
          echo "Total build size:"
          du -sh build/
          echo ""
          echo "JavaScript files:"
          js_count=$(find build -name "*.js" | wc -l)
          echo "Count: $js_count"
          if [ $js_count -gt 0 ]; then
            find build -name "*.js" -exec du -ch {} + | tail -1
          else
            echo "No JavaScript files found"
          fi
          echo ""
          echo "CSS files:"
          css_count=$(find build -name "*.css" | wc -l)
          echo "Count: $css_count"
          if [ $css_count -gt 0 ]; then
            find build -name "*.css" -exec du -ch {} + | tail -1
          else
            echo "No CSS files found"
          fi
          echo ""
          echo "Largest files:"
          find build -type f -exec ls -lh {} \; | sort -k5 -hr | head -5
