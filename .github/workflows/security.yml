name: Security & Dependencies

on:
  schedule:
    # Run every Monday at 9 AM UTC
    - cron: '0 9 * * 1'
  pull_request:
    branches: [main]
  workflow_dispatch: # Allow manual trigger

jobs:
  security:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v1
        with:
          deno-version: v2.x # Or your specific Deno version

      - name: Cache Deno and Node modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.deno
            ~/.cache/deno
            node_modules
          key: ${{ runner.os }}-deno-node_modules-${{ hashFiles('deno.json', 'deno.lock') }}
          restore-keys: |
            ${{ runner.os }}-deno-node_modules-

      - name: Install dependencies
        run: deno task install # Or your specific install command

      - name: Run security audit
        run: |
          echo "Running Deno security checks (deno check, deno lint, deno test)..."
          deno task check || echo "Deno check found issues."
          deno task lint || echo "Deno lint found issues."
          deno task test || echo "Deno tests failed."
          # Add specific vulnerability scanning if available for Deno, e.g., with a third-party tool
          echo "Dependency vulnerability scanning might require a Deno-specific tool or manual checks."

      - name: Check for outdated dependencies
        run: deno task outdated || true # Assuming you have an "outdated" task or equivalent
